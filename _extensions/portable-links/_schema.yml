# _schema.yml for "portable-links" filter extension
# Describes options and element attributes for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     portable-links:
#       enabled: true
options:
  enabled:
    type: boolean
    default: true
    description: "Enable or disable the portable-links filter."

# Element attributes accepted by the filter on Pandoc elements.
# Group keys: CSS class name, ID prefix, element type (Div, Span, Code,
# CodeBlock, Header), or _any for all elements.
# Used in: [text]{.portable-links attr=value} or ::: {.portable-links attr=value}
element-attributes:
  portable-links:
    example-attr:
      type: string
      description: "An example attribute for the portable-links filter."
