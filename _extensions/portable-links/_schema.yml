# _schema.yml for "portable-links" filter extension
# Describes options for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     portable-links:
#       enabled: true
options:
  enabled:
    type: boolean
    default: true
    description: "Enable or disable cross-page link rewriting."
